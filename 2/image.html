<!DOCTYPE HTML>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像の高解像度対応</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
        }

        .container {
            padding-left: 5vw; /* 幅の5%を左の余白にする */
            padding-right: 5vw;
        }

        .container div {
            margin-bottom: 40px;
        }

        span {
            display: block;
            padding-top: 0.25em;
            font-size: 0.8em;
        }

        img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>
            <img src="google_logo_half.png" alt="300px x 100px">
            <span>300px x 100px</span>
        </div>

        <div>
            <img src="google_logo.png" alt="300px x 100px">
            <span>300px x 100px</span>
        </div>

        <div>
            <img src="google_logo@2x.png" alt="300px x 100px">
            <span>300px x 100px</span>
        </div>

        <div>
            <img src="google_logo.svg" alt="300px x 100px">
            <span>300px x 100px</span>
        </div>

        <div>
            <img src="photo_half.jpg" alt="300px x 200px">
            <span>300px x 200px</span>
        </div>

        <div>
            <img src="photo.jpg" alt="300px x 200px">
            <span>300px x 200px</span>
        </div>

        <div>
            <img src="photo@2x.jpg" alt="300px x 200px">
            <span>300px x 200px</span>
        </div>
    </div>
</body>

</html>
